<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Gully Cricket 26</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #080c14;
      --bg2: #0d1220;
      --panel: #111827;
      --panel2: #161e2e;
      --glass: rgba(255, 255, 255, .06);
      --glass2: rgba(255, 255, 255, .10);
      --line: rgba(255, 255, 255, .09);
      --line2: rgba(255, 255, 255, .16);
      --text: #e8f0ff;
      --muted: #8a9ab8;
      --dim: #4a5568;
      --lime: #b8ff00;
      --limeSoft: rgba(184, 255, 0, .12);
      --cyan: #00d4ff;
      --cyanSoft: rgba(0, 212, 255, .10);
      --orange: #ff8c00;
      --orangeSoft: rgba(255, 140, 0, .12);
      --red: #ff3d5a;
      --redSoft: rgba(255, 61, 90, .12);
      --green: #00e5a0;
      --greenSoft: rgba(0, 229, 160, .12);
      --purple: #a78bfa;
      --purpleSoft: rgba(167, 139, 250, .12);
      --gold: #ffcc44;
      --goldSoft: rgba(255, 204, 68, .13);
      --r: 20px;
      --r2: 14px;
      --display: "Bebas Neue", Impact, sans-serif;
      --body: "Inter", system-ui, sans-serif;
      --mono: "JetBrains Mono", monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      -webkit-font-smoothing: antialiased
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      overflow-x: hidden;
      font-size: 14px
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      color: inherit
    }

    button {
      cursor: pointer;
      border: 0
    }

    ::selection {
      background: var(--lime);
      color: #020801
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(184, 255, 0, .4);
      border-radius: 999px
    }

    .stadium-bg {
      position: fixed;
      inset: 0;
      z-index: -3;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(184, 255, 0, .10), transparent), radial-gradient(ellipse 60% 40% at 15% 30%, rgba(0, 212, 255, .07), transparent), radial-gradient(ellipse 50% 35% at 88% 20%, rgba(167, 139, 250, .07), transparent), linear-gradient(180deg, #080c14 0%, #0a0f1c 50%, #060810 100%)
    }

    .stadium-bg::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, .025) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .025) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse at 50% 0%, black 30%, transparent 75%)
    }

    .stadium-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 0 40%, rgba(255, 255, 255, .03) 42%, transparent 45%);
      animation: sweep 8s linear infinite;
      pointer-events: none
    }

    @keyframes sweep {
      from {
        transform: translateX(-100%)
      }

      to {
        transform: translateX(100%)
      }
    }

    .app {
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: 14px
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding: 12px 16px;
      border: 1px solid var(--line);
      background: rgba(8, 12, 20, .80);
      backdrop-filter: blur(20px);
      border-radius: 22px;
      position: sticky;
      top: 8px;
      z-index: 50;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .4)
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--lime), #78ff38);
      color: #040c02;
      font-family: var(--display);
      font-size: 30px;
      flex: 0 0 auto;
      box-shadow: 0 0 0 1px rgba(184, 255, 0, .3)
    }

    .brand-text h1 {
      font-family: var(--display);
      font-size: 26px;
      letter-spacing: .05em;
      line-height: 1
    }

    .brand-text p {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--lime);
      letter-spacing: .2em;
      text-transform: uppercase;
      margin-top: 2px
    }

    .livepill {
      display: flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line);
      background: var(--glass);
      border-radius: 999px;
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--lime);
      animation: pulse 1.4s ease infinite
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(184, 255, 0, .7)
      }

      70% {
        box-shadow: 0 0 0 8px rgba(184, 255, 0, 0)
      }
    }

    .screen {
      animation: fadeUp .28s ease both
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .hero {
      min-height: calc(100vh - 100px);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 30px 0
    }

    .hero-card {
      width: min(960px, 100%);
      border: 1px solid var(--line);
      background: linear-gradient(150deg, rgba(255, 255, 255, .07), rgba(255, 255, 255, .025));
      border-radius: 32px;
      padding: 60px 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0, 0, 0, .5)
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      background: radial-gradient(circle at 50% 0, rgba(184, 255, 0, .15), transparent 40%), radial-gradient(circle at 85% 35%, rgba(0, 212, 255, .10), transparent 35%);
      z-index: -1
    }

    .badge {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--lime);
      font-weight: 600;
      margin-bottom: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(184, 255, 0, .3);
      background: rgba(184, 255, 0, .08);
      border-radius: 999px;
      padding: 6px 14px
    }

    .badge::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--lime)
    }

    .hero-title {
      font-family: var(--display);
      font-size: clamp(72px, 13vw, 170px);
      line-height: .82;
      letter-spacing: .04em;
      text-transform: uppercase;
      text-shadow: 0 0 60px rgba(184, 255, 0, .15)
    }

    .hero-title em {
      color: var(--lime);
      font-style: normal
    }

    .hero-sub {
      max-width: 680px;
      margin: 18px auto 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 28px
    }

    .hero-stats {
      display: flex;
      gap: 0;
      justify-content: center;
      margin-top: 36px;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(0, 0, 0, .2);
      max-width: 600px;
      margin-left: auto;
      margin-right: auto
    }

    .hs {
      flex: 1;
      padding: 14px;
      border-right: 1px solid var(--line);
      text-align: center
    }

    .hs:last-child {
      border-right: 0
    }

    .hs .k {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--dim);
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: 5px
    }

    .hs .v {
      font-family: var(--display);
      font-size: 28px;
      color: var(--lime)
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 13px;
      padding: 12px 18px;
      font-weight: 800;
      letter-spacing: .01em;
      transition: .16s ease;
      min-height: 44px;
      font-size: 13px
    }

    .btn:hover {
      transform: translateY(-2px)
    }

    .btn:active {
      transform: scale(.97)
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--lime), #8aff20);
      color: #030a01;
      box-shadow: 0 12px 40px rgba(184, 255, 0, .15)
    }

    .btn.secondary {
      background: var(--glass2);
      border: 1px solid var(--line2);
      color: var(--text)
    }

    .btn.red {
      background: var(--redSoft);
      border: 1px solid rgba(255, 61, 90, .25);
      color: var(--red)
    }

    .btn.green {
      background: var(--greenSoft);
      border: 1px solid rgba(0, 229, 160, .25);
      color: var(--green)
    }

    .btn.cyan {
      background: var(--cyanSoft);
      border: 1px solid rgba(0, 212, 255, .25);
      color: var(--cyan)
    }

    .btn.orange {
      background: var(--orangeSoft);
      border: 1px solid rgba(255, 140, 0, .25);
      color: var(--orange)
    }

    .btn.full {
      width: 100%
    }

    .btn.sm {
      padding: 7px 12px;
      min-height: 32px;
      border-radius: 10px;
      font-size: 11px
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none
    }

    .step-kicker {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--lime);
      letter-spacing: .2em;
      text-transform: uppercase;
      margin-bottom: 6px
    }

    .step-title {
      font-family: var(--display);
      font-size: clamp(42px, 7vw, 84px);
      line-height: .88;
      letter-spacing: .03em;
      text-transform: uppercase
    }

    .step-sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
      margin-top: 8px;
      max-width: 640px
    }

    .step-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
      margin: 20px 0 16px
    }

    .glass {
      border: 1px solid var(--line);
      background: linear-gradient(150deg, rgba(255, 255, 255, .065), rgba(255, 255, 255, .025));
      border-radius: var(--r);
      backdrop-filter: blur(12px);
      overflow: hidden
    }

    .panel {
      padding: 16px
    }

    .grid {
      display: grid;
      gap: 12px
    }

    .grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr))
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr))
    }

    .grid.four {
      grid-template-columns: repeat(4, minmax(0, 1fr))
    }

    .field {
      display: grid;
      gap: 6px
    }

    .label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--dim);
      font-weight: 600
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(5, 8, 16, .75);
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
      color: var(--text);
      transition: .14s ease
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.5
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(184, 255, 0, .5);
      box-shadow: 0 0 0 3px rgba(184, 255, 0, .06)
    }

    .hint {
      font-size: 11px;
      color: var(--dim);
      line-height: 1.5
    }

    .setup-layout {
      display: grid;
      grid-template-columns: .85fr 1.15fr;
      gap: 12px
    }

    .mini-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px
    }

    .mini-title h3 {
      font-size: 15px;
      font-weight: 900
    }

    .mini-title span {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--dim);
      letter-spacing: .12em;
      text-transform: uppercase
    }

    .team-card {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
      border-radius: 16px;
      padding: 13px;
      margin-top: 10px
    }

    .team-card h4 {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 14px;
      margin-bottom: 8px
    }

    .cap-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--goldSoft);
      border: 1px solid rgba(255, 204, 68, .22);
      color: var(--gold);
      font-size: 9px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: .08em
    }

    .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      color: var(--muted)
    }

    .chip.cap {
      border-color: rgba(255, 204, 68, .28);
      color: var(--gold);
      background: var(--goldSoft)
    }

    .toss-layout {
      display: grid;
      grid-template-columns: .78fr 1.22fr;
      gap: 12px;
      align-items: stretch
    }

    .coin-wrap {
      display: grid;
      place-items: center;
      min-height: 420px;
      position: relative;
      background: radial-gradient(circle at center, rgba(184, 255, 0, .12), transparent 50%), rgba(255, 255, 255, .03);
      overflow: hidden
    }

    .coin {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(from 0deg, #d4ff00, #b8ff00 30%, #8fff38 60%, #b8ff00 80%, #d4ff00);
      color: #030a01;
      font-family: var(--display);
      font-size: 80px;
      letter-spacing: .03em;
      box-shadow: inset 0 -16px 30px rgba(0, 0, 0, .15), inset 0 10px 20px rgba(255, 255, 255, .4), 0 0 0 8px rgba(184, 255, 0, .15);
      border: 7px solid rgba(255, 255, 255, .28);
      position: relative
    }

    .coin::before {
      content: "";
      position: absolute;
      inset: 16px;
      border: 2px dashed rgba(3, 10, 1, .22);
      border-radius: 50%
    }

    .coin.flip {
      animation: coinFlip .15s linear infinite
    }

    @keyframes coinFlip {
      0% {
        transform: rotateY(0) translateY(0)
      }

      50% {
        transform: rotateY(180deg) translateY(-16px)
      }

      100% {
        transform: rotateY(360deg) translateY(0)
      }
    }

    .toss-info {
      display: grid;
      gap: 11px
    }

    .versus {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center
    }

    .cap-card {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
      border-radius: 18px;
      padding: 14px
    }

    .cap-card .side {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--dim);
      letter-spacing: .16em;
      text-transform: uppercase
    }

    .cap-card .name {
      font-size: 18px;
      font-weight: 900;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .cap-card .tm {
      color: var(--gold);
      font-size: 11px;
      margin-top: 3px;
      font-weight: 800
    }

    .vs-txt {
      font-family: var(--display);
      font-size: 38px;
      color: var(--lime)
    }

    .toss-result {
      border: 1px solid rgba(184, 255, 0, .22);
      background: linear-gradient(135deg, rgba(184, 255, 0, .10), rgba(0, 212, 255, .07));
      border-radius: 20px;
      padding: 16px;
      display: grid;
      gap: 10px
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px
    }

    .result-tile {
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, .18);
      border-radius: 13px;
      padding: 11px
    }

    .result-tile .k {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--dim);
      letter-spacing: .13em;
      text-transform: uppercase;
      margin-bottom: 3px
    }

    .result-tile .v {
      font-size: 14px;
      font-weight: 900
    }

    .target-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .tgt {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--muted)
    }

    .tgt strong {
      color: var(--text);
      font-size: 14px;
      margin-left: 5px
    }

    .openers-layout {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 12px
    }

    .lineup-list {
      display: grid;
      gap: 7px;
      max-height: 440px;
      overflow: auto;
      padding-right: 2px
    }

    .player-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
      border-radius: 13px;
      padding: 10px 11px
    }

    .player-row strong {
      font-size: 13px
    }

    .player-row span {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: .09em
    }

    .scoreboard {
      position: relative;
      overflow: hidden;
      border-radius: 26px;
      border: 1px solid var(--line);
      background: linear-gradient(145deg, #08101e, #0c1828 55%, #080e1c);
      box-shadow: 0 30px 80px rgba(0, 0, 0, .5);
      margin-bottom: 12px
    }

    .scoreboard::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .03) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(ellipse at 50% 0%, black 30%, transparent 75%)
    }

    .scorebar {
      height: 4px;
      background: linear-gradient(90deg, var(--lime), var(--cyan), var(--purple), var(--orange), var(--red));
      position: relative;
      z-index: 1
    }

    .score-inner {
      position: relative;
      z-index: 1;
      padding: 20px
    }

    .score-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 10px
    }

    .match-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid rgba(184, 255, 0, .22);
      background: rgba(184, 255, 0, .09);
      color: var(--lime);
      border-radius: 999px;
      padding: 6px 12px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .12em;
      text-transform: uppercase
    }

    .venue-txt {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: .09em;
      text-align: right;
      text-transform: uppercase
    }

    .score-main {
      display: flex;
      align-items: flex-end;
      gap: 18px;
      flex-wrap: wrap;
      margin: 6px 0 14px
    }

    .runs {
      font-family: var(--display);
      font-size: clamp(72px, 12vw, 140px);
      line-height: .82;
      letter-spacing: .03em
    }

    .runs span {
      color: var(--lime)
    }

    .score-meta {
      padding-bottom: 6px;
      display: grid;
      gap: 5px
    }

    .score-meta h2 {
      font-size: 22px;
      font-weight: 900
    }

    .score-meta p {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .07em;
      text-transform: uppercase
    }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px
    }

    .stat {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
      border-radius: 14px;
      padding: 11px
    }

    .stat .k {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--dim);
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: 5px
    }

    .stat .v {
      font-family: var(--display);
      font-size: 26px;
      line-height: 1
    }

    .stat .v.lime {
      color: var(--lime)
    }

    .stat .v.cyan {
      color: var(--cyan)
    }

    .stat .v.green {
      color: var(--green)
    }

    .stat .v.red {
      color: var(--red)
    }

    .stat .v.gold {
      color: var(--gold)
    }

    .main-layout {
      display: grid;
      grid-template-columns: 1.35fr .65fr;
      gap: 12px
    }

    .stack {
      display: grid;
      gap: 12px
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px
    }

    .section-title h3 {
      font-size: 16px;
      font-weight: 900
    }

    .section-title p {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--dim);
      letter-spacing: .12em;
      text-transform: uppercase
    }

    .tabs {
      display: flex;
      gap: 6px;
      background: rgba(0, 0, 0, .2);
      border: 1px solid var(--line);
      border-radius: 17px;
      padding: 5px;
      margin-bottom: 12px
    }

    .tab {
      flex: 1;
      min-width: 80px;
      padding: 9px 11px;
      border-radius: 13px;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
      font-size: 12px
    }

    .tab.active {
      background: var(--lime);
      color: #030a01
    }

    .batters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px
    }

    .batter {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
      border-radius: 17px;
      padding: 13px;
      position: relative;
      overflow: hidden
    }

    .batter.strike {
      border-color: rgba(184, 255, 0, .4);
      background: linear-gradient(135deg, rgba(184, 255, 0, .10), rgba(255, 255, 255, .03))
    }

    .batter.strike::after {
      content: "ON STRIKE";
      position: absolute;
      right: 10px;
      top: 10px;
      font-family: var(--mono);
      font-size: 8px;
      color: var(--lime);
      letter-spacing: .11em
    }

    .role {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--dim);
      letter-spacing: .15em;
      text-transform: uppercase;
      margin-bottom: 5px
    }

    .b-name {
      font-size: 15px;
      font-weight: 900;
      padding-right: 78px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .b-score {
      font-family: var(--display);
      font-size: 40px;
      line-height: 1;
      margin-top: 7px
    }

    .b-score small {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted)
    }

    .b-detail {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px
    }

    .bowler-card {
      border: 1px solid rgba(0, 212, 255, .22);
      background: linear-gradient(135deg, rgba(0, 212, 255, .09), rgba(255, 255, 255, .03));
      border-radius: 17px;
      padding: 13px
    }

    .bowler-top {
      display: flex;
      justify-content: space-between;
      gap: 8px
    }

    .bowler-name {
      font-size: 16px;
      font-weight: 900
    }

    .bowler-nums {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 9px
    }

    .bowler-nums span {
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, .15);
      padding: 6px 9px;
      border-radius: 10px;
      font-size: 11px;
      color: var(--muted)
    }

    .bowler-nums strong {
      color: var(--text)
    }

    .run-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px
    }

    .run-btn {
      min-height: 68px;
      border-radius: 17px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .05);
      display: grid;
      place-items: center;
      font-family: var(--display);
      font-size: 32px;
      transition: .13s ease;
      position: relative;
      overflow: hidden;
      color: var(--text)
    }

    .run-btn small {
      display: block;
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--dim);
      margin-top: -7px
    }

    .run-btn:hover {
      transform: translateY(-2px);
      border-color: var(--line2);
      background: rgba(255, 255, 255, .09)
    }

    .run-btn.four {
      color: var(--cyan);
      background: var(--cyanSoft);
      border-color: rgba(0, 212, 255, .26)
    }

    .run-btn.six {
      color: var(--green);
      background: var(--greenSoft);
      border-color: rgba(0, 229, 160, .26)
    }

    .run-btn.wicket {
      color: var(--red);
      background: var(--redSoft);
      border-color: rgba(255, 61, 90, .26);
      font-size: 24px
    }

    .run-btn.extra {
      color: var(--orange);
      background: var(--orangeSoft);
      border-color: rgba(255, 140, 0, .23);
      font-size: 23px
    }

    .extras-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-top: 9px
    }

    .extra-btn {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
      border-radius: 12px;
      padding: 10px 8px;
      font-weight: 800;
      color: var(--orange);
      font-size: 12px
    }

    .extra-btn:hover {
      background: var(--orangeSoft)
    }

    .over-box {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
      border-radius: 17px;
      padding: 13px
    }

    .ball-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .ball {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .05);
      font-family: var(--display);
      font-size: 14px;
      color: var(--muted)
    }

    .ball.four {
      background: var(--cyanSoft);
      border-color: rgba(0, 212, 255, .3);
      color: var(--cyan)
    }

    .ball.six {
      background: var(--greenSoft);
      border-color: rgba(0, 229, 160, .3);
      color: var(--green)
    }

    .ball.wicket {
      background: var(--redSoft);
      border-color: rgba(255, 61, 90, .3);
      color: var(--red)
    }

    .ball.extra {
      background: var(--orangeSoft);
      border-color: rgba(255, 140, 0, .3);
      color: var(--orange)
    }

    .ball.dot {
      color: var(--dim);
      background: rgba(255, 255, 255, .02)
    }

    .commentary {
      display: grid;
      gap: 7px;
      max-height: 320px;
      overflow: auto
    }

    .comm {
      display: grid;
      grid-template-columns: 40px 1fr;
      gap: 9px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
      border-radius: 13px;
      padding: 9px
    }

    .comm .tag {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--limeSoft);
      color: var(--lime);
      font-family: var(--display);
      font-size: 13px
    }

    .comm p {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45
    }

    .comm strong {
      color: var(--text)
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 16px
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
      background: rgba(0, 0, 0, .10)
    }

    th {
      padding: 11px 12px;
      text-align: left;
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--dim);
      border-bottom: 1px solid var(--line)
    }

    td {
      padding: 11px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      font-size: 12px;
      color: var(--muted);
      font-weight: 600
    }

    td.num,
    th.num {
      text-align: right;
      font-family: var(--mono)
    }

    td.name {
      color: var(--text);
      font-weight: 900
    }

    td.out {
      color: var(--red)
    }

    td.notout {
      color: var(--lime)
    }

    tr:last-child td {
      border-bottom: 0
    }

    .records {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px
    }

    .record {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
      border-radius: 16px;
      padding: 13px
    }

    .record .k {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--dim);
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: 6px
    }

    .record .v {
      font-family: var(--display);
      font-size: 30px;
      line-height: 1
    }

    .record .who {
      font-size: 11px;
      color: var(--muted);
      font-weight: 800;
      margin-top: 3px
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .sum-card {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
      border-radius: 17px;
      padding: 14px
    }

    .sum-card h4 {
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 900
    }

    .sum-card p {
      color: var(--muted);
      line-height: 1.65;
      font-size: 12px
    }

    .fall-list {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .fall {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      color: var(--muted)
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 4, 10, .80);
      backdrop-filter: blur(14px);
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 16px;
      animation: fadeUp .18s ease both
    }

    .modal {
      width: min(540px, 100%);
      border: 1px solid var(--line2);
      background: linear-gradient(145deg, #0b1325, #060c18);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0, 0, 0, .6)
    }

    .modal-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .04)
    }

    .modal-title {
      font-family: var(--display);
      font-size: 38px;
      line-height: .95;
      letter-spacing: .04em
    }

    .modal-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 5px
    }

    .modal-body {
      padding: 16px;
      display: grid;
      gap: 12px
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .fx {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: none;
      place-items: center;
      pointer-events: none
    }

    .fx.show {
      display: grid
    }

    .fx-card {
      text-align: center;
      animation: fxPop .65s cubic-bezier(.34, 1.56, .64, 1) both
    }

    .fx-title {
      font-family: var(--display);
      font-size: clamp(80px, 16vw, 190px);
      line-height: .85;
      letter-spacing: .05em
    }

    .fx-sub {
      font-family: var(--mono);
      font-size: 14px;
      letter-spacing: .22em;
      text-transform: uppercase;
      margin-top: 8px
    }

    @keyframes fxPop {
      0% {
        opacity: 0;
        transform: scale(.1) rotate(-6deg)
      }

      55% {
        opacity: 1;
        transform: scale(1.06)
      }

      100% {
        opacity: 1;
        transform: scale(1)
      }
    }

    .break-hero {
      min-height: calc(100vh - 100px);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 30px 0
    }

    .break-card,
    .end-card {
      width: min(880px, 100%);
      text-align: center;
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(255, 255, 255, .075), rgba(255, 255, 255, .03));
      border-radius: 30px;
      padding: 42px 22px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, .5)
    }

    .break-title,
    .end-title {
      font-family: var(--display);
      font-size: clamp(58px, 11vw, 130px);
      line-height: .82;
      letter-spacing: .05em
    }

    .break-title em,
    .end-title em {
      color: var(--lime);
      font-style: normal
    }

    .break-sub,
    .end-sub {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      max-width: 680px;
      margin: 14px auto
    }

    .mega-score {
      font-family: var(--display);
      font-size: clamp(66px, 11vw, 126px);
      line-height: .85;
      margin: 16px 0
    }

    .empty {
      border: 1px dashed var(--line2);
      border-radius: 16px;
      padding: 26px;
      text-align: center;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .13em;
      text-transform: uppercase
    }

    .danger-zone {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 9px
    }

    .mobile-space {
      height: 18px
    }

    @media(max-width:960px) {

      .setup-layout,
      .toss-layout,
      .openers-layout,
      .main-layout {
        grid-template-columns: 1fr
      }

      .stat-row {
        grid-template-columns: repeat(3, 1fr)
      }

      .records {
        grid-template-columns: repeat(2, 1fr)
      }

      .coin-wrap {
        min-height: 280px
      }

      .coin {
        width: 150px;
        height: 150px;
        font-size: 60px
      }

      .result-grid {
        grid-template-columns: repeat(2, 1fr)
      }
    }

    @media(max-width:640px) {
      .app {
        padding: 8px
      }

      .topbar {
        top: 5px;
        border-radius: 18px;
        padding: 9px 12px
      }

      .logo {
        width: 40px;
        height: 40px;
        font-size: 25px;
        border-radius: 12px
      }

      .brand-text h1 {
        font-size: 20px
      }

      .livepill {
        display: none
      }

      .hero-card {
        padding: 36px 14px;
        border-radius: 26px
      }

      .grid.two,
      .grid.three,
      .grid.four,
      .batters,
      .summary-grid {
        grid-template-columns: 1fr
      }

      .stat-row {
        grid-template-columns: repeat(2, 1fr)
      }

      .run-grid {
        grid-template-columns: repeat(3, 1fr)
      }

      .extras-grid {
        grid-template-columns: repeat(2, 1fr)
      }

      .records {
        grid-template-columns: 1fr
      }

      .versus {
        grid-template-columns: 1fr
      }

      .vs-txt,
      .cap-card {
        text-align: center
      }

      .result-grid {
        grid-template-columns: 1fr
      }

      .panel {
        padding: 12px
      }

      .score-inner {
        padding: 14px
      }

      .runs {
        font-size: 72px
      }

      .step-head {
        flex-direction: column;
        align-items: flex-start
      }
    }
  </style>
</head>

<body>
  <div class="stadium-bg"></div>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">G</div>
        <div class="brand-text">
          <h1>Gully Cricket 26</h1>
          <p>Arena Scoring System</p>
        </div>
      </div>
      <div class="livepill"><span class="dot"></span><span id="topStatus">Ready</span></div>
    </header>
    <main id="app"></main>
  </div>
  <div class="fx" id="fx">
    <div class="fx-card">
      <div class="fx-title" id="fxTitle"></div>
      <div class="fx-sub" id="fxSub"></div>
    </div>
  </div>
  <script>
    const KEY = 'gully26-v1';
    const $ = id => document.getElementById(id);
    const esc = v => String(v ?? '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
    const uid = () => Date.now() + Math.random().toString(16).slice(2);
    const defaultPool = ['Vishan', 'Kush', 'Rahul', 'Aman', 'Meet', 'Jay', 'Harsh', 'Dev', 'Om', 'Yash', 'Karan', 'Raj'];
    const defaultState = () => ({
      phase: 'welcome', tab: 'scoring', currentInnings: 0, modal: null, notice: 'Ready',
      setup: { matchName: 'Sunday Gully Premier League', venue: 'Society Ground', overs: 5, ballType: 'Tennis Ball', teamA: 'Vishan XI', teamB: 'Kush XI', captainA: 'Vishan', captainB: 'Kush' },
      pool: [...defaultPool],
      teams: { A: { players: ['Vishan', 'Rahul', 'Aman', 'Meet', 'Jay', 'Harsh'] }, B: { players: ['Kush', 'Dev', 'Om', 'Yash', 'Karan', 'Raj'] } },
      toss: { done: false, flipping: false, caller: '', call: '', coinResult: '', winner: '', decision: '', batFirst: '', bowlFirst: '' },
      innings: [], commentary: []
    });
    let S = load();
    function load() { try { return JSON.parse(localStorage.getItem(KEY)) || defaultState() } catch (e) { return defaultState() } }
    function save() { localStorage.setItem(KEY, JSON.stringify(S)) }
    function setNotice(t) { S.notice = t; const s = $('topStatus'); if (s) s.textContent = t }
    function teamName(k) { return S.setup[k === 'A' ? 'teamA' : 'teamB'] || `Team ${k}` }
    function captain(k) { return S.setup[k === 'A' ? 'captainA' : 'captainB'] || S.teams[k].players[0] || `Captain ${k}` }
    function other(k) { return k === 'A' ? 'B' : 'A' }
    function parseNames(txt) { return txt.split(/\n|,/).map(x => x.trim()).filter(Boolean).filter((v, i, a) => a.indexOf(v) === i) }
    function oversText(balls) { return Math.floor(balls / 6) + '.' + (balls % 6) }
    function rate(r, b) { return b ? Number((r / (b / 6)).toFixed(2)) : 0 }
    function maxWickets(inn) { return Math.max((inn?.batters?.length || 2) - 1, 1) }
    function newBatter(name) { return { name, runs: 0, balls: 0, fours: 0, sixes: 0, dots: 0, out: false, status: 'Yet to bat', dismissal: '', fielder: '', bowler: '' } }
    function newBowler(name) { return { name, balls: 0, runs: 0, wickets: 0, dots: 0, wides: 0, noballs: 0, maidens: 0 } }
    function makeInnings(num, bat, bowl, target = 0) {
      const batters = S.teams[bat].players.slice(), bowlers = S.teams[bowl].players.slice();
      const batStats = {}; batters.forEach(n => batStats[n] = newBatter(n));
      const bowlStats = {}; bowlers.forEach(n => bowlStats[n] = newBowler(n));
      return {
        number: num, batting: bat, bowling: bowl, target, runs: 0, wickets: 0, legalBalls: 0,
        extras: { total: 0, wides: 0, noballs: 0, byes: 0, legbyes: 0 }, batters, bowlers, batStats, bowlStats,
        striker: '', nonStriker: '', bowler: '', balls: [], fall: [], completed: false, resultText: ''
      }
    }
    function inn() { return S.innings[S.currentInnings] }
    function scoreLine(i = inn()) { return `${i.runs}/${i.wickets}` }
    function currentScore() { const i = inn(); return i ? { runs: i.runs, wickets: i.wickets, overs: oversText(i.legalBalls), rr: rate(i.runs, i.legalBalls).toFixed(2) } : { runs: 0, wickets: 0, overs: '0.0', rr: '0.00' } }
    function requiredInfo(i = inn()) { if (!i || !i.target) return null; const need = Math.max(i.target - i.runs, 0), left = Math.max(Number(S.setup.overs) * 6 - i.legalBalls, 0); return { need, left, rrr: left ? Number((need / (left / 6)).toFixed(2)) : need ? Infinity : 0 } }
    function availableBatters(i = inn()) { return i.batters.filter(n => !i.batStats[n].out && n !== i.striker && n !== i.nonStriker) }
    function swapStrike(i = inn()) { const t = i.striker; i.striker = i.nonStriker; i.nonStriker = t }
    function ballClass(b) { if (b.wicket) return 'wicket'; if (['WD', 'NB', 'B', 'LB'].includes(b.type)) return 'extra'; if (b.batRuns === 4) return 'four'; if (b.batRuns === 6) return 'six'; if (b.total === 0) return 'dot'; return '' }
    function ballLabel(b) { if (b.wicket) return 'W'; if (b.type === 'WD') return 'Wd'; if (b.type === 'NB') return 'Nb'; if (b.type === 'B') return `B${b.extras}`; if (b.type === 'LB') return `Lb${b.extras}`; return String(b.batRuns) }
    function commText(i, b) {
      if (b.wicket) return `<strong>WICKET!</strong> ${esc(b.outBatter)} is out — ${esc(b.dismissalText)}. ${esc(teamName(i.batting))} ${i.runs}/${i.wickets}.`;
      if (b.batRuns === 6) return `<strong>SIX!</strong> ${esc(b.striker)} sends it over the rope. Maximum!`;
      if (b.batRuns === 4) return `<strong>FOUR!</strong> ${esc(b.striker)} finds the boundary.`;
      if (b.type === 'WD') return `<strong>Wide.</strong> Extra run added, ball replayed.`;
      if (b.type === 'NB') return `<strong>No ball.</strong> Extra run added, ball replayed.`;
      if (b.type === 'B') return `<strong>Bye.</strong> ${b.extras} run(s) added.`;
      if (b.type === 'LB') return `<strong>Leg bye.</strong> ${b.extras} run(s) added.`;
      if (b.batRuns === 0) return `<strong>Dot.</strong> Tight delivery from ${esc(b.bowler)}.`;
      if (b.batRuns === 1) return `<strong>Single.</strong> Strike rotated by ${esc(b.striker)}.`;
      return `<strong>${b.batRuns} runs.</strong> Good running.`
    }
    function showFx(kind, sub) {

      const m = map[kind] || [kind, 'var(--lime)', 'rgba(184,255,0,.08)'];
      t.textContent = m[0]; t.style.color = m[1]; s.textContent = sub || ''; s.style.color = m[1]; fx.style.background = m[2];
      fx.classList.add('show'); clearTimeout(showFx.t); showFx.t = setTimeout(() => fx.classList.remove('show'), 900)
    }
    const App = {
      start() { S.phase = 'setup'; save(); render() },
      resetAll() { if (confirm('Start a new match?')) { S = defaultState(); save(); render() } },
      readSetup() {
        S.setup.matchName = $('matchName')?.value.trim() || S.setup.matchName;
        S.setup.venue = $('venue')?.value.trim() || S.setup.venue;
        S.setup.overs = Math.max(1, Number($('overs')?.value || 5));
        S.setup.ballType = $('ballType')?.value.trim() || 'Tennis Ball';
        S.setup.teamA = $('teamA')?.value.trim() || 'Team A';
        S.setup.teamB = $('teamB')?.value.trim() || 'Team B';
        S.setup.captainA = $('captainA')?.value.trim() || '';
        S.setup.captainB = $('captainB')?.value.trim() || '';
        S.pool = parseNames($('playerPool')?.value || defaultPool.join('\n'));
        S.teams.A.players = parseNames($('teamAPlayers')?.value || '');
        S.teams.B.players = parseNames($('teamBPlayers')?.value || '');
        if (!S.setup.captainA) S.setup.captainA = S.teams.A.players[0] || 'Captain A';
        if (!S.setup.captainB) S.setup.captainB = S.teams.B.players[0] || 'Captain B'
      },
      autoDraft() {
        const pool = parseNames($('playerPool')?.value || defaultPool.join('\n'));
        if (pool.length < 4) { alert('Enter at least 4 players.'); return }
        const a = [], b = []; pool.forEach((p, i) => (i % 2 ? a : b).push(p));
        $('teamAPlayers').value = a.join('\n'); $('teamBPlayers').value = b.join('\n');
        if (!$('captainA').value.trim()) $('captainA').value = a[0] || '';
        if (!$('captainB').value.trim()) $('captainB').value = b[0] || '';
        App.readSetup(); save(); render()
      },
      lockSetup() {
        App.readSetup();
        if (S.teams.A.players.length < 2 || S.teams.B.players.length < 2) { alert('Both teams need at least 2 players.'); return }
        if (!S.teams.A.players.includes(S.setup.captainA)) S.teams.A.players.unshift(S.setup.captainA);
        if (!S.teams.B.players.includes(S.setup.captainB)) S.teams.B.players.unshift(S.setup.captainB);
        S.phase = 'toss'; S.toss = { done: false, flipping: false, caller: '', call: '', coinResult: '', winner: '', decision: '', batFirst: '', bowlFirst: '' };
        S.innings = []; S.currentInnings = 0; S.commentary = []; setNotice('Toss'); save(); render()
      },
      autoToss() {
        if (S.toss.flipping) return;
        const caller = Math.random() > .5 ? 'A' : 'B', call = Math.random() > .5 ? 'Heads' : 'Tails';
        S.toss = { done: false, flipping: true, caller, call, coinResult: '', winner: '', decision: '', batFirst: '', bowlFirst: '' };
        setNotice('Coin flipping'); save(); render();
        setTimeout(() => {
          const result = Math.random() > .5 ? 'Heads' : 'Tails';
          const winner = (result === S.toss.call) ? S.toss.caller : other(S.toss.caller);
          const decision = Math.random() > .5 ? 'Bat' : 'Bowl';
          const batFirst = decision === 'Bat' ? winner : other(winner);
          const bowlFirst = other(batFirst);
          S.toss = { ...S.toss, done: true, flipping: false, coinResult: result, winner, decision, batFirst, bowlFirst };
          showFx('TARGET', `${teamName(winner)} won the toss`); setNotice('Toss result'); save(); render()
        }, 1500)
      },
      goOpeners() {
        if (!S.toss.done) return;
        if (!S.innings.length) { S.innings = [makeInnings(1, S.toss.batFirst, S.toss.bowlFirst, 0)]; S.currentInnings = 0 }
        S.phase = 'openers'; setNotice('Select openers'); save(); render()
      },
      startInnings() {
        const i = inn();
        const st = $('strikerSelect').value, ns = $('nonStrikerSelect').value, bw = $('bowlerSelect').value;
        if (!st || !ns || !bw || st === ns) { alert('Select different striker/non-striker and a bowler.'); return }
        i.striker = st; i.nonStriker = ns; i.bowler = bw;
        i.batStats[st].status = 'Batting'; i.batStats[ns].status = 'Batting';
        S.phase = 'live'; S.tab = 'scoring'; setNotice(`Innings ${i.number} live`); save(); render()
      },
      setTab(t) { S.tab = t; save(); render() },
      addRun(r) { App.addDelivery({ batRuns: r, type: '', extras: 0, legal: true, wicket: false }) },
      addExtra(type, extraRuns) { App.addDelivery({ batRuns: 0, type, extras: extraRuns, legal: !(type === 'WD' || type === 'NB'), wicket: false }) },
      openWicket() { S.modal = { type: 'wicket' }; save(); render() },
      confirmWicket() {
        const dismissal = $('dismissalType').value, outBatter = $('outBatter').value,
          fielder = $('fielderName').value.trim(), next = $('nextBatter').value,
          runs = Math.max(0, Number($('wicketRuns').value || 0));
        if (!outBatter) { alert('Select dismissed batter.'); return }
        const needsNext = (inn().wickets + 1) < maxWickets(inn());
        if (needsNext && !next) { alert('Select next batter.'); return }
        S.modal = null; App.addDelivery({ batRuns: runs, type: '', extras: 0, legal: true, wicket: true, wicketData: { dismissal, outBatter, fielder, next } })
      },
      closeModal() { S.modal = null; save(); render() },
      addDelivery(d) {
        const i = inn(); if (!i || S.phase !== 'live') return;
        if (!i.striker || !i.nonStriker || !i.bowler) { alert('Need striker, non-striker and bowler.'); return }
        const beforeOver = Math.floor(i.legalBalls / 6), st = i.striker, ns = i.nonStriker, bw = i.bowler;
        const total = (d.batRuns || 0) + (d.extras || 0);
        const b = {
          id: uid(), over: beforeOver, ballInOver: (i.legalBalls % 6) + 1, striker: st, nonStriker: ns, bowler: bw,
          batRuns: d.batRuns || 0, extras: d.extras || 0, total, type: d.type || '', legal: d.legal, wicket: !!d.wicket,
          outBatter: '', dismissal: '', fielder: '', dismissalText: ''
        };
        i.runs += total;
        const bat = i.batStats[st];
        if (bat) { bat.status = 'Batting'; if (d.legal) { bat.balls++; if (total === 0) bat.dots++ } bat.runs += b.batRuns; if (b.batRuns === 4) bat.fours++; if (b.batRuns === 6) bat.sixes++ }
        if (i.batStats[ns]) i.batStats[ns].status = 'Batting';
        const bow = i.bowlStats[bw] || newBowler(bw); i.bowlStats[bw] = bow;
        bow.runs += total; if (d.legal) bow.balls++; if (total === 0 && d.legal) bow.dots++;
        if (d.type === 'WD') bow.wides++; if (d.type === 'NB') bow.noballs++;
        if (d.type) {
          i.extras.total += d.extras || 0; if (d.type === 'WD') i.extras.wides += d.extras || 0;
          if (d.type === 'NB') i.extras.noballs += d.extras || 0; if (d.type === 'B') i.extras.byes += d.extras || 0;
          if (d.type === 'LB') i.extras.legbyes += d.extras || 0
        }
        if (d.legal) i.legalBalls++;
        if (d.wicket) {
          const w = d.wicketData || {}; b.outBatter = w.outBatter || st; b.dismissal = w.dismissal || 'Bowled';
          b.fielder = w.fielder || ''; b.dismissalText = b.dismissal + (b.fielder ? ` by ${b.fielder}` : '');
          const out = i.batStats[b.outBatter];
          if (out) { out.out = true; out.status = 'Out'; out.dismissal = b.dismissal; out.fielder = b.fielder; out.bowler = bw }
          i.wickets++;
          const bowlerGets = !['Run Out', 'Retired Hurt', 'Obstructing'].includes(b.dismissal);
          if (bowlerGets) bow.wickets++;
          i.fall.push({ score: i.runs, wicket: i.wickets, batter: b.outBatter, over: oversText(i.legalBalls) })
        }
        i.balls.push(b);
        S.commentary.unshift({ id: uid(), label: ballLabel(b), html: commText(i, b) }); S.commentary = S.commentary.slice(0, 80);
        if (d.wicket) {
          if (d.legal && (d.batRuns || 0) % 2 === 1) swapStrike(i);
          const next = d.wicketData?.next || '';
          if (i.wickets < maxWickets(i) && next) {
            if (b.outBatter === i.striker) i.striker = next; else if (b.outBatter === i.nonStriker) i.nonStriker = next;
            i.batStats[next].status = 'Batting'
          }
        }
        else { const swap = (d.type === 'B' || d.type === 'LB') ? d.extras : d.batRuns; if (d.legal && swap % 2 === 1) swapStrike(i) }

        if (b.wicket) showFx('WICKET', b.dismissalText);
        else if (b.batRuns === 6) showFx('SIX', 'Maximum');
        else if (b.batRuns === 4) showFx('FOUR', 'Boundary');
        else if (b.type === 'WD') showFx('WIDE', 'Extra ball');
        else if (b.type === 'NB') showFx('NO', 'Extra ball');
        else if (b.batRuns === 0 && d.legal) showFx('DOT', 'No run');

    window.App = App;

    function rStep(k, t, s) { return `<div class="step-head"><div><div class="step-kicker">Step ${k}</div><div class="step-title">${t}</div><p class="step-sub">${s}</p></div><button class="btn secondary sm" onclick="App.resetAll()">New Match</button></div>` }

    function rScoring() { return `<div class="glass panel"><div class="section-title"><h3>Ball-by-Ball Scoring</h3><p>Tap result</p></div><div class="run-grid"><button class="run-btn" onclick="App.addRun(0)">0<small>Dot</small></button><button class="run-btn" onclick="App.addRun(1)">1<small>Single</small></button><button class="run-btn" onclick="App.addRun(2)">2<small>Double</small></button><button class="run-btn" onclick="App.addRun(3)">3<small>Triple</small></button><button class="run-btn four" onclick="App.addRun(4)">4<small>Four</small></button><button class="run-btn six" onclick="App.addRun(6)">6<small>Six</small></button><button class="run-btn wicket" onclick="App.openWicket()">W<small>Wicket</small></button><button class="run-btn extra" onclick="App.addExtra('WD',1)">Wd<small>Wide</small></button></div><div class="extras-grid"><button class="extra-btn" onclick="App.addExtra('NB',1)">No Ball +1</button><button class="extra-btn" onclick="App.addExtra('B',1)">Bye 1</button><button class="extra-btn" onclick="App.addExtra('B',2)">Bye 2</button><button class="extra-btn" onclick="App.addExtra('LB',1)">Leg Bye 1</button><button class="extra-btn" onclick="App.addExtra('LB',2)">Leg Bye 2</button><button class="extra-btn" onclick="App.addExtra('B',4)">Bye 4</button></div></div>` }
    function rSide() { return `${rBats()}${rBowl()}${rOver()}${rComm()}<div class="danger-zone"><button class="btn secondary sm" onclick="App.restartSame()">Restart Teams</button><button class="btn red sm" onclick="App.resetAll()">Reset All</button></div>` }
    function batCard(name, strike) { const i = inn(), b = i.batStats[name] || newBatter(name), sr = b.balls ? ((b.runs / b.balls) * 100).toFixed(1) : '0.0'; return `<div class="batter ${strike ? 'strike' : ''}"><div class="role">${strike ? 'Striker' : 'Non-Striker'}</div><div class="b-name">${esc(name)} ${name === captain(i.batting) ? '(C)' : ''}</div><div class="b-score">${b.runs}<small>(${b.balls})</small></div><div class="b-detail">4s ${b.fours} &middot; 6s ${b.sixes} &middot; SR ${sr}</div></div>` }
    function rBats() { const i = inn(); return `<div class="glass panel"><div class="section-title"><h3>Batters</h3><p>Strike auto-rotates</p></div><div class="batters">${batCard(i.striker, true)}${batCard(i.nonStriker, false)}</div></div>` }
    function rBowl() { const i = inn(), b = i.bowlStats[i.bowler] || newBowler(i.bowler); return `<div class="bowler-card"><div class="bowler-top"><div><div class="role">Current Bowler</div><div class="bowler-name">${esc(i.bowler)} ${i.bowler === captain(i.bowling) ? '(C)' : ''}</div></div><div class="match-pill">${oversText(b.balls)} ov</div></div><div class="bowler-nums"><span>R <strong>${b.runs}</strong></span><span>W <strong>${b.wickets}</strong></span><span>Dots <strong>${b.dots}</strong></span><span>Wd <strong>${b.wides}</strong></span><span>Nb <strong>${b.noballs}</strong></span></div></div>` }
    function rOver() { const i = inn(), g = groupOvers(i), cur = g[g.length - 1] || [], last = g.filter(x => x.filter(b => b.legal).length >= 6).slice(-1)[0] || []; return `<div class="over-box"><div class="section-title"><h3>This Over</h3><p>${cur.reduce((s, b) => s + b.total, 0)} runs</p></div><div class="ball-row">${cur.length ? cur.map(b => `<span class="ball ${ballClass(b)}">${ballLabel(b)}</span>`).join('') : '<span class="chip">No balls yet</span>'}</div></div><div class="over-box"><div class="section-title"><h3>Last Over</h3><p>${last.reduce((s, b) => s + b.total, 0)} runs</p></div><div class="ball-row">${last.length ? last.map(b => `<span class="ball ${ballClass(b)}">${ballLabel(b)}</span>`).join('') : '<span class="chip">No completed over yet</span>'}</div></div>` }
    function groupOvers(i) { const g = []; i.balls.forEach(b => { if (!g[b.over]) g[b.over] = []; g[b.over].push(b) }); return g.filter(Boolean) }
    function rComm() { return `<div class="glass panel"><div class="section-title"><h3>Commentary</h3><p>Latest first</p></div><div class="commentary">${S.commentary.length ? S.commentary.slice(0, 8).map(c => `<div class="comm"><div class="tag">${esc(c.label)}</div><p>${c.html}</p></div>`).join('') : '<div class="empty">Commentary appears here</div>'}</div></div>` }
    function rScorecard() { const i = inn(); return `<div class="glass panel"><div class="section-title"><h3>${esc(teamName(i.batting))} Batting</h3><p>${scoreLine(i)} in ${oversText(i.legalBalls)}</p></div><div class="table-wrap"><table><thead><tr><th>Batter</th><th>Status</th><th class="num">R</th><th class="num">B</th><th class="num">4s</th><th class="num">6s</th><th class="num">SR</th></tr></thead><tbody>${i.batters.map(n => batRow(i, i.batStats[n])).join('')}</tbody></table></div><div style="height:10px"></div><div class="section-title"><h3>${esc(teamName(i.bowling))} Bowling</h3></div><div class="table-wrap"><table><thead><tr><th>Bowler</th><th class="num">O</th><th class="num">R</th><th class="num">W</th><th class="num">Dots</th><th class="num">Wd</th><th class="num">Nb</th><th class="num">Eco</th></tr></thead><tbody>${Object.values(i.bowlStats).filter(b => b.balls || b.runs).map(bowlRow).join('') || '<tr><td colspan="8">No data yet.</td></tr>'}</tbody></table></div></div>` }
    function batRow(i, b) { const sr = b.balls ? ((b.runs / b.balls) * 100).toFixed(1) : '0.0'; let st = b.status; if (b.out) { st = b.dismissal === 'Caught' ? `c ${b.fielder || 'f'} b ${b.bowler}` : b.dismissal === 'Bowled' ? `b ${b.bowler}` : b.dismissal === 'LBW' ? `lbw b ${b.bowler}` : b.dismissal === 'Run Out' ? `run out ${b.fielder || ''}` : b.dismissal } else if (b.status === 'Batting') st = 'Not out'; return `<tr><td class="name">${esc(b.name)} ${b.name === captain(i.batting) ? '(C)' : ''}</td><td class="${b.out ? 'out' : b.status === 'Batting' ? 'notout' : ''}">${esc(st)}</td><td class="num">${b.runs}</td><td class="num">${b.balls}</td><td class="num">${b.fours}</td><td class="num">${b.sixes}</td><td class="num">${sr}</td></tr>` }
    function bowlRow(b) { const eco = b.balls ? (b.runs / (b.balls / 6)).toFixed(2) : '0.00'; return `<tr><td class="name">${esc(b.name)}</td><td class="num">${oversText(b.balls)}</td><td class="num">${b.runs}</td><td class="num">${b.wickets}</td><td class="num">${b.dots}</td><td class="num">${b.wides}</td><td class="num">${b.noballs}</td><td class="num">${eco}</td></tr>` }
    function rRecords() {
      const i = inn(), bats = Object.values(i.batStats), bows = Object.values(i.bowlStats);
      const high = bats.slice().sort((a, b) => b.runs - a.runs)[0] || newBatter('-');
      const most6 = bats.slice().sort((a, b) => b.sixes - a.sixes)[0] || newBatter('-');
      const most4 = bats.slice().sort((a, b) => b.fours - a.fours)[0] || newBatter('-');
      const best = bows.slice().sort((a, b) => b.wickets - a.wickets || a.runs - b.runs)[0] || newBowler('-');
      const dots = bows.slice().sort((a, b) => b.dots - a.dots)[0] || newBowler('-');
      return `<div class="glass panel"><div class="section-title"><h3>Records &amp; Insights</h3><p>Live leaders</p></div><div class="records"><div class="record"><div class="k">Top Score</div><div class="v">${high.runs}</div><div class="who">${esc(high.name)}</div></div><div class="record"><div class="k">Most Sixes</div><div class="v">${most6.sixes}</div><div class="who">${esc(most6.name)}</div></div><div class="record"><div class="k">Most Fours</div><div class="v">${most4.fours}</div><div class="who">${esc(most4.name)}</div></div><div class="record"><div class="k">Best Bowler</div><div class="v">${best.wickets}/${best.runs}</div><div class="who">${esc(best.name)}</div></div><div class="record"><div class="k">Dot Pressure</div><div class="v">${dots.dots}</div><div class="who">${esc(dots.name)}</div></div><div class="record"><div class="k">Run Rate</div><div class="v">${currentScore().rr}</div><div class="who">${esc(teamName(i.batting))}</div></div><div class="record"><div class="k">Extras</div><div class="v">${i.extras.total}</div><div class="who">Wd ${i.extras.wides} &middot; Nb ${i.extras.noballs}</div></div><div class="record"><div class="k">Overs</div><div class="v">${oversText(i.legalBalls)}</div><div class="who">of ${S.setup.overs}.0</div></div></div></div>`
    }
    function rSummary() { const i = inn(); return `<div class="glass panel"><div class="section-title"><h3>Match Summary</h3></div><div class="summary-grid"><div class="sum-card"><h4>Batting</h4><p><strong>${esc(teamName(i.batting))}</strong> are ${scoreLine(i)} after ${oversText(i.legalBalls)} overs. RR: ${rate(i.runs, i.legalBalls).toFixed(2)}.</p></div><div class="sum-card"><h4>Extras</h4><p>Total ${i.extras.total} — Wd ${i.extras.wides}, Nb ${i.extras.noballs}, By ${i.extras.byes}, Lb ${i.extras.legbyes}.</p></div><div class="sum-card"><h4>Fall of Wickets</h4><div class="fall-list">${i.fall.length ? i.fall.map(f => `<span class="fall">${f.wicket}-${f.score} ${esc(f.batter)} (${f.over})</span>`).join('') : '<span class="fall">No wickets yet</span>'}</div></div><div class="sum-card"><h4>Situation</h4><p>${sitLine(i)}</p></div></div></div>` }
    function sitLine(i) { const req = requiredInfo(i); if (req) return `${teamName(i.batting)} need ${req.need} from ${req.left} balls. RRR: ${req.rrr === Infinity ? '∞' : req.rrr}.`; return `${teamName(i.batting)} setting target. ${Math.max(Number(S.setup.overs) * 6 - i.legalBalls, 0)} balls remain.` }
    function rModal() {
      if (!S.modal) return ''; const i = inn();
      if (S.modal.type === 'nextBowler') { const opts = i.bowlers.map(n => `<option value="${esc(n)}" ${n === i.bowler ? 'disabled' : ''}>${esc(n)}${n === captain(i.bowling) ? ' (C)' : ''}</option>`).join(''); return `<div class="overlay"><div class="modal"><div class="modal-head"><div class="modal-title">Over Complete</div><div class="modal-sub">Over ${S.modal.completedOver} done. Pick next bowler.</div></div><div class="modal-body"><label class="field"><span class="label">Next Bowler</span><select id="nextBowler">${opts}</select></label><button class="btn primary full" onclick="App.setNextBowler()">Start Next Over</button></div></div></div>` }
      if (S.modal.type === 'wicket') { const outO = [i.striker, i.nonStriker].filter(Boolean).map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join(''); const nxt = availableBatters(i).map(n => `<option value="${esc(n)}">${esc(n)}${n === captain(i.batting) ? ' (C)' : ''}</option>`).join(''); return `<div class="overlay"><div class="modal"><div class="modal-head"><div class="modal-title">Wicket Panel</div><div class="modal-sub">Set dismissal details and bring in next batter.</div></div><div class="modal-body"><div class="grid two"><label class="field"><span class="label">Dismissed Batter</span><select id="outBatter">${outO}</select></label><label class="field"><span class="label">Dismissal Type</span><select id="dismissalType"><option>Bowled</option><option>Caught</option><option>Run Out</option><option>LBW</option><option>Stumped</option><option>Caught and Bowled</option><option>Hit Wicket</option></select></label></div><label class="field"><span class="label">Fielder / Catcher / Run Out By</span><input id="fielderName" placeholder="Optional"></label><div class="grid two"><label class="field"><span class="label">Runs Completed</span><select id="wicketRuns"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></label><label class="field"><span class="label">Next Batter</span><select id="nextBatter"><option value="">${(i.wickets + 1) >= maxWickets(i) ? 'No batter needed' : 'Select next batter'}</option>${nxt}</select></label></div><div class="modal-actions"><button class="btn red full" onclick="App.confirmWicket()">Confirm Wicket</button><button class="btn secondary full" onclick="App.closeModal()">Cancel</button></div></div></div></div>` }
      return ''
    }
    function rBreak() { const i1 = S.innings[0], i2 = S.innings[1]; return `<section class="break-hero screen"><div class="break-card"><div class="badge">Innings Break</div><div class="break-title">Target <em>${i2.target}</em></div><div class="mega-score">${esc(teamName(i1.batting))} ${i1.runs}/${i1.wickets}</div><p class="break-sub">${esc(teamName(i2.batting))} need ${i2.target} in ${S.setup.overs}.0 overs to win.</p><div class="hero-actions"><button class="btn primary" onclick="App.startChase()">Start Chase</button><button class="btn secondary" onclick="(S.tab='scorecard',S.phase='live',S.currentInnings=0,save(),render())">First Innings Card</button></div></div></section>` }
    function rMatchEnd() { const i1 = S.innings[0], i2 = S.innings[1]; return `<section class="screen"><div class="break-hero"><div class="end-card"><div class="badge">Match Complete</div><div class="end-title"><em>Game</em> Over</div><p class="end-sub" style="font-size:20px;font-weight:900;color:var(--text)">${esc(resTxt())}</p><div class="target-row" style="justify-content:center"><div class="tgt">${esc(teamName(i1.batting))} <strong>${i1.runs}/${i1.wickets}</strong> (${oversText(i1.legalBalls)})</div><div class="tgt">${esc(teamName(i2.batting))} <strong>${i2.runs}/${i2.wickets}</strong> (${oversText(i2.legalBalls)})</div></div><div class="hero-actions"><button class="btn primary" onclick="S.currentInnings=1;S.phase='live';S.tab='scorecard';save();render()">Final Scoreboard</button><button class="btn green" onclick="App.restartSame()">Restart Same Teams</button><button class="btn secondary" onclick="App.newMatch()">New Teams</button></div></div></div>${rFinal()}</section>` }
    function resTxt() { const i1 = S.innings[0], i2 = S.innings[1]; if (!i1 || !i2) return 'Match complete'; if (i2.runs >= i2.target) return `${teamName(i2.batting)} won by ${maxWickets(i2) - i2.wickets} wickets`; const d = i1.runs - i2.runs; if (d === 0) return 'Match tied'; return `${teamName(i1.batting)} won by ${d} run${d === 1 ? '' : 's'}` }
    function rSCFor(idx) { const old = S.currentInnings; S.currentInnings = idx; const out = rScorecard(); S.currentInnings = old; return out }
    function rFinal() { return `<div class="grid two">${rSCFor(0)}${rSCFor(1)}</div>` }
    function render() {
      const app = $('app'); setNotice(S.notice || 'Ready'); let html = '';
      if (S.phase === 'welcome') html = rWelcome();
      else if (S.phase === 'setup') html = rSetup();
      else if (S.phase === 'toss') html = rToss();
      else if (S.phase === 'openers') html = rOpeners();
      else if (S.phase === 'live') html = rLive();
      else if (S.phase === 'inningsBreak') html = rBreak();
      else if (S.phase === 'matchEnd') html = rMatchEnd();
      app.innerHTML = html + rModal(); save()
    }
    render();
  </script>
</body>

</html>
